<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mario Bros v1 | Go + Ebiten + Wasm</title>
  <style>
    :root {
      --bg-1: #0e1f3d;
      --bg-2: #2d7de7;
      --card: rgba(12, 23, 44, 0.75);
      --line: #ffd166;
      --text: #fff7e6;
      --muted: #d3def0;
      --ok: #ffd166;
      --err: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 30% 10%, var(--bg-2), var(--bg-1) 58%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .panel {
      width: min(100%, 1060px);
      background: var(--card);
      border: 1px solid rgba(255, 209, 102, 0.42);
      border-radius: 16px;
      padding: 18px;
      backdrop-filter: blur(6px);
    }
    h1 { margin: 0; font-size: clamp(24px, 3vw, 36px); }
    p { margin: 8px 0; color: var(--muted); }
    .status { margin-top: 10px; font-weight: 700; color: var(--ok); }
    .status.error { color: var(--err); }
    canvas {
      display: block;
      width: 100%;
      max-width: 100%;
      margin-top: 14px;
      border: 1px solid rgba(255, 209, 102, 0.45);
      border-radius: 10px;
      box-shadow: 0 0 18px rgba(59, 130, 246, 0.3);
      image-rendering: pixelated;
    }
    code {
      background: rgba(255, 255, 255, 0.08);
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Mario Bros v3/v1</h1>
    <p>Controls: <code>Left/Right</code>, <code>Space</code></p>
    <p id="status" class="status">Loading WebAssembly...</p>
  </main>

  <script src="./wasm_exec/wasm_exec.js"></script>
  <script>
    const wasmFile = "mario.wasm";
    const statusEl = document.getElementById("status");

    async function loadWasm() {
      if (!("WebAssembly" in window)) {
        throw new Error("This browser does not support WebAssembly.");
      }
      if (typeof Go === "undefined") {
        throw new Error("wasm_exec.js was not loaded.");
      }

      const go = new Go();
      let result;

      try {
        result = await WebAssembly.instantiateStreaming(fetch(wasmFile), go.importObject);
      } catch (streamError) {
        const response = await fetch(wasmFile);
        const bytes = await response.arrayBuffer();
        result = await WebAssembly.instantiate(bytes, go.importObject);
      }

      statusEl.textContent = "Running game...";
      go.run(result.instance);
    }

    loadWasm().catch((error) => {
      console.error(error);
      statusEl.textContent = "Error loading wasm: " + error.message;
      statusEl.classList.add("error");
    });
  </script>
</body>
</html>
